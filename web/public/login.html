<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReforgedZ Transcripts - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--bg-dark:#111;--surface:#181818;--surface-raised:#202020;--border:rgba(255,255,255,.07);--border-hover:rgba(255,255,255,.15);--accent:#cc1f1f;--accent-dim:rgba(204,31,31,.12);--accent-hover:#e02525;--text:#f0f0f0;--text-dim:#aaa;--text-ghost:#777}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:40px;width:380px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.login-box h1{text-align:center;margin-bottom:6px;color:var(--text);font-family:'Oswald',sans-serif;font-size:1.6rem;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.login-box h1 span{color:var(--accent)}
.login-box p{text-align:center;color:var(--text-ghost);margin-bottom:28px;font-size:.85rem}
label{display:block;margin-bottom:6px;color:var(--text-dim);font-size:.8rem;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:4px;background:var(--bg-dark);color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;margin-bottom:16px;outline:none;transition:border .2s}
input:focus{border-color:rgba(204,31,31,.4)}
input::placeholder{color:var(--text-ghost)}
button{width:100%;padding:12px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-family:'Oswald',sans-serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:background .2s,box-shadow .2s}
button:hover{background:var(--accent-hover);box-shadow:0 8px 24px rgba(204,31,31,.4)}
.error{color:var(--accent);text-align:center;margin-bottom:12px;font-size:.85rem;display:none}
.brand-bar{width:3px;height:48px;background:var(--accent);position:absolute;left:0;top:50%;transform:translateY(-50%);border-radius:0 2px 2px 0}
.login-box{position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
</style>
</head>
<body>
<div class="login-box">
	<h1><span>Reforged</span>Z Transcripts</h1>
	<p>Admin Panel</p>
	<div class="error" id="error"></div>
	<form id="loginForm">
		<label for="username">Username</label>
		<input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required>
		<label for="password">Password</label>
		<input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
		<button type="submit">Sign In</button>
	</form>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit",async(e)=>{
	e.preventDefault();
	const err=document.getElementById("error");
	err.style.display="none";
	try{
		const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:document.getElementById("username").value,password:document.getElementById("password").value})});
		const d=await r.json();
		if(d.success){window.location.href="/admin"}
		else{err.textContent=d.error||"Login failed";err.style.display="block"}
	}catch{err.textContent="Connection error";err.style.display="block"}
});
</script>
</body>
</html>
