<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReforgedZ Transcripts - Ban Appeals / Applications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0c;--bg-dark:#111;--bg-black:#080808;--surface:#181818;--surface-raised:#202020;--border:rgba(255,255,255,.07);--border-hover:rgba(255,255,255,.15);--accent:#cc1f1f;--accent-dim:rgba(204,31,31,.12);--accent-hover:#e02525;--text:#f0f0f0;--text-dim:#aaa;--text-ghost:#777}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

header{background:var(--bg-black);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
header h1{font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text)}
header h1 span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.header-right span{color:var(--text-ghost);font-size:.82rem}

.btn{padding:8px 16px;border:1px solid var(--border);border-radius:4px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:var(--text-dim)}
.btn:hover{border-color:var(--border-hover);background:var(--surface-raised)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover);box-shadow:0 8px 24px rgba(204,31,31,.4)}

main{max-width:1280px;margin:0 auto;padding:24px}

.gate{max-width:420px;margin:80px auto 0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:32px;position:relative;overflow:hidden}
.gate::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.gate h2{font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.gate .sub{color:var(--text-ghost);font-size:.82rem;margin-bottom:20px}
.gate label{display:block;margin-bottom:6px;color:var(--text-dim);font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
.gate input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:4px;background:var(--bg-dark);color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;margin-bottom:16px;outline:none;transition:border .2s}
.gate input:focus{border-color:rgba(204,31,31,.4)}
.gate .err{color:var(--accent);font-size:.82rem;margin-bottom:12px;display:none}
.gate .actions{display:flex;gap:10px}
.gate .actions button{flex:1;padding:12px;border:none;border-radius:4px;font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;transition:all .2s}
.gate .actions .unlock{background:var(--accent);color:#fff}
.gate .actions .unlock:hover{background:var(--accent-hover)}
.gate .actions .cancel{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.gate .actions .cancel:hover{border-color:var(--border-hover);background:var(--surface-raised)}

.search-bar{display:flex;gap:12px;margin-bottom:24px}
.search-bar input{flex:1;padding:10px 16px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border .2s}
.search-bar input:focus{border-color:rgba(204,31,31,.4)}
.search-bar input::placeholder{color:var(--text-ghost)}

.warning-banner{background:rgba(241,196,15,.08);border:1px solid rgba(241,196,15,.25);border-left:3px solid #f1c40f;padding:10px 14px;margin-bottom:16px;border-radius:4px;color:#f1c40f;font-size:.82rem}

table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden}
thead{background:var(--bg-black)}
th{padding:12px 16px;text-align:left;font-family:'Oswald',sans-serif;font-size:.75rem;color:var(--text-ghost);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
td{padding:12px 16px;border-top:1px solid var(--border);font-size:.85rem}
tr{transition:background .15s}
tr:hover td{background:var(--surface-raised)}

.cat-badge{padding:3px 10px;border-radius:3px;font-size:.7rem;font-weight:600;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.5px;display:inline-block;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(204,31,31,.2)}

a{color:var(--accent);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent-hover)}

.pagination{display:flex;justify-content:center;gap:6px;margin-top:24px}
.pagination button{padding:8px 14px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text-dim);cursor:pointer;font-family:'Inter',sans-serif;font-size:.82rem;transition:all .2s}
.pagination button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pagination button:hover:not(.active){border-color:var(--border-hover);background:var(--surface-raised)}
.pagination button:disabled{opacity:.3;cursor:default}

.empty{text-align:center;padding:48px;color:var(--text-ghost)}
.time{color:var(--text-ghost);font-size:.78rem}
.hidden{display:none !important}
</style>
</head>
<body>
<header>
	<h1><span>Reforged</span>Z Transcripts <span style="color:var(--text-ghost);font-size:.8rem;margin-left:8px">/ Ban Appeals</span></h1>
	<div class="header-right">
		<span id="adminName"></span>
		<button class="btn" onclick="backToAdmin()">Back to Admin</button>
		<button class="btn" id="lockBtn" onclick="lockAppeals()" style="display:none">Lock Appeals</button>
		<button class="btn btn-accent" onclick="logout()">Logout</button>
	</div>
</header>

<main>
	<div id="gate" class="gate">
		<h2>Restricted Area</h2>
		<div class="sub">Enter the Ban Appeal / Application transcript password to continue.</div>
		<div class="err" id="gateErr"></div>
		<form id="gateForm">
			<label for="gatePw">Password</label>
			<input type="password" id="gatePw" autocomplete="current-password" required autofocus>
			<div class="actions">
				<button type="button" class="cancel" onclick="backToAdmin()">Cancel</button>
				<button type="submit" class="unlock">Unlock</button>
			</div>
		</form>
	</div>

	<div id="panel" class="hidden">
		<div class="warning-banner">These transcripts contain sensitive ban appeal / application content. Do not share externally.</div>
		<div class="search-bar">
			<input type="text" id="searchInput" placeholder="Search by ticket #, player name, category, or content...">
			<button class="btn btn-accent" onclick="search()">Search</button>
			<button class="btn" onclick="clearSearch()">Clear</button>
		</div>
		<div id="tableWrap">
			<table>
				<thead><tr>
					<th>Ticket #</th>
					<th>Channel</th>
					<th>Category</th>
					<th>Created By</th>
					<th>Closed By</th>
					<th>Reason</th>
					<th>Msgs</th>
					<th>Date</th>
					<th>Actions</th>
				</tr></thead>
				<tbody id="tbody"></tbody>
			</table>
		</div>
		<div class="pagination" id="pagination"></div>
	</div>
</main>

<script>
let currentPage=1,currentSearch="";

function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML}

function fmtDate(ts){
	if(!ts)return"-";
	const d=new Date(ts);
	return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

function truncate(s,n){if(!s)return"-";return s.length>n?s.substring(0,n)+"...":s;}

function backToAdmin(){window.location.href="/admin"}

async function logout(){
	await fetch("/api/auth/logout",{method:"POST"});
	window.location.href="/login";
}

async function lockAppeals(){
	await fetch("/api/auth/appeal-lock",{method:"POST"});
	showGate();
}

async function checkAuth(){
	try{
		const r=await fetch("/api/auth/me");
		if(!r.ok)throw 0;
		const d=await r.json();
		document.getElementById("adminName").textContent=d.username;
	}catch{window.location.href="/login"}
}

async function checkAppealStatus(){
	try{
		const r=await fetch("/api/auth/appeal-status");
		const d=await r.json();
		if(d.unlocked){showPanel()}else{showGate()}
	}catch{showGate()}
}

function showGate(){
	document.getElementById("gate").classList.remove("hidden");
	document.getElementById("panel").classList.add("hidden");
	document.getElementById("lockBtn").style.display="none";
	const pw=document.getElementById("gatePw");
	pw.value="";pw.focus();
}

function showPanel(){
	document.getElementById("gate").classList.add("hidden");
	document.getElementById("panel").classList.remove("hidden");
	document.getElementById("lockBtn").style.display="";
	loadTickets(1,"");
}

document.getElementById("gateForm").addEventListener("submit",async(e)=>{
	e.preventDefault();
	const err=document.getElementById("gateErr");
	err.style.display="none";
	try{
		const r=await fetch("/api/auth/appeal-unlock",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:document.getElementById("gatePw").value})});
		const d=await r.json();
		if(d.success){showPanel()}
		else{err.textContent=d.error||"Invalid password";err.style.display="block"}
	}catch{err.textContent="Connection error";err.style.display="block"}
});

async function loadTickets(page=1,search=""){
	currentPage=page;currentSearch=search;
	const params=new URLSearchParams({page,limit:50});
	if(search)params.set("search",search);
	try{
		const r=await fetch("/api/appeal-tickets?"+params);
		if(r.status===401){showGate();return}
		if(!r.ok)throw 0;
		const d=await r.json();
		const tbody=document.getElementById("tbody");
		if(d.tickets.length===0){
			tbody.innerHTML='<tr><td colspan="9" class="empty">No transcripts found</td></tr>';
		}else{
			tbody.innerHTML=d.tickets.map(t=>`<tr>
				<td><strong>#${esc(t.ticketId)||"-"}</strong></td>
				<td>${esc(t.channelName)||"-"}</td>
				<td><span class="cat-badge">${esc(t.category)||"Unknown"}</span></td>
				<td>${esc(t.createdByName)||"-"}</td>
				<td>${esc(t.closedByName)||"-"}</td>
				<td>${esc(truncate(t.closeReason,40))}</td>
				<td>${t.messageCount||0}</td>
				<td class="time">${fmtDate(t.closedAt)}</td>
				<td><a href="/t/${esc(t.id)}" target="_blank">View</a></td>
			</tr>`).join("");
		}
		renderPagination(d.page,d.totalPages);
	}catch{document.getElementById("tbody").innerHTML='<tr><td colspan="9" class="empty">Failed to load</td></tr>'}
}

function renderPagination(current,total){
	const el=document.getElementById("pagination");
	if(total<=1){el.innerHTML="";return}
	let html="";
	const start=Math.max(1,current-3),end=Math.min(total,current+3);
	if(start>1)html+=`<button onclick="loadTickets(1,currentSearch)">1</button>`;
	if(start>2)html+=`<button disabled>...</button>`;
	for(let i=start;i<=end;i++){
		html+=`<button class="${i===current?"active":""}" onclick="loadTickets(${i},currentSearch)">${i}</button>`;
	}
	if(end<total-1)html+=`<button disabled>...</button>`;
	if(end<total)html+=`<button onclick="loadTickets(${total},currentSearch)">${total}</button>`;
	el.innerHTML=html;
}

function search(){loadTickets(1,document.getElementById("searchInput").value.trim())}
function clearSearch(){document.getElementById("searchInput").value="";loadTickets(1,"")}
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")search()});

(async()=>{
	await checkAuth();
	await checkAppealStatus();
})();
</script>
</body>
</html>
